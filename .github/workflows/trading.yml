name: KIS 자동매매

on:
  schedule:
    # 평일 장 시작 전 (KST 08:55 = UTC 23:55 전날)
    - cron: '55 23 * * 0-4'
    # 평일 장중 매 5분 (KST 09:00~15:30 = UTC 00:00~06:30)
    - cron: '0-30/5 0-6 * * 1-5'
    # 평일 장 종료 후 결산 (KST 15:35 = UTC 06:35)
    - cron: '35 6 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: true
        default: 'run-once'
        type: choice
        options:
          - run-once
          - balance
          - market
      code:
        description: '종목코드 (market 모드 시)'
        required: false
        default: '005930'

concurrency:
  group: trading
  cancel-in-progress: false

jobs:
  trade:
    name: 매매 실행
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 잔고 조회 (수동 balance 모드)
        if: github.event.inputs.mode == 'balance'
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --mode balance

      - name: 종목 시세 조회 (수동 market 모드)
        if: github.event.inputs.mode == 'market'
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
        run: python main.py --mode market --code ${{ github.event.inputs.code || '005930' }}

      - name: 자동매매 단일 사이클
        if: github.event_name == 'schedule' || github.event.inputs.mode == 'run-once'
        env:
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LOG_LEVEL: INFO
        run: python main.py --run-once

      - name: 로그 아티팩트 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trading-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore
