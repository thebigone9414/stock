name: 옥동자 자동매매

on:
  # 모든 스케줄은 cron-job.org 외부 트리거로 관리 (GitHub 내장 크론 제거)
  # → GitHub cron 지연·누락 방지, 중복 실행 방지
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: true
        default: 'check-watchlist'
        type: choice
        options:
          - morning          # 전략1 오전 수급 (cron-job.org 트리거)
          - ma-morning       # 전략2 MA이평선 (cron-job.org 트리거)
          - ma-batch         # MA 이평선 배치 (16:30 KST)
          - canslim-morning  # 전략3 CANSLIM (cron-job.org 트리거)
          - canslim-batch    # CANSLIM 스크리닝 배치 (16:40 KST)
          - sepa-morning     # 전략4 SEPA (cron-job.org 트리거)
          - sepa-batch       # SEPA 트렌드템플릿+VCP 배치 (17:00 KST)
          - darvas-morning   # 전략5 Darvas Box (cron-job.org 트리거)
          - darvas-batch     # Darvas Box 스크리닝 배치 (17:10 KST)
          - connors-morning  # 전략6 Connors RSI(2) (cron-job.org 트리거)
          - connors-batch    # Connors RSI(2) 스크리닝 배치 (17:20 KST)
          - update-watchlist # KOSPI200+KOSDAQ150 구성 종목 갱신 (월 1회 자동)
          - balance          # 잔고 조회
          - check-watchlist  # 종목 수급 API 테스트
          - debug-investor   # 단일 종목 raw JSON 덤프
          - market           # 단일 종목 시세
      code:
        description: '종목코드 (market/debug-investor 모드 전용)'
        required: false
        default: '005930'
      force:
        description: '휴장일·중복 체크 무시 (canslim-batch 전용)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  # 배치(ma-batch·canslim-batch·sepa-batch·update-watchlist): okdongja-batch 그룹
  # S1(morning): okdongja-s1 그룹 (07:50~09:50, 최대 150분 점유)
  # S2/S3/S4(ma-morning·canslim-morning·sepa-morning): okdongja-trading 그룹
  # → S1 실행 중에도 S2/S3/S4가 별도 큐에서 즉시 실행 가능
  group: >-
    ${{
      (github.event.inputs.mode == 'ma-batch'      ||
       github.event.inputs.mode == 'canslim-batch' ||
       github.event.inputs.mode == 'sepa-batch'    ||
       github.event.inputs.mode == 'darvas-batch'  ||
       github.event.inputs.mode == 'connors-batch' ||
       github.event.inputs.mode == 'update-watchlist')
      && 'okdongja-batch'
      || github.event.inputs.mode == 'morning'
      && 'okdongja-s1'
      || 'okdongja-trading'
    }}
  cancel-in-progress: false   # 실행 중인 매매 절대 중단 금지

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Job A: 전략2 — MA 이평선 중장기
# 08:55 시작 (ma-morning 트리거) → 09:00 정규장 개장 대기 → 시장가 매수/매도
# cron-job.org: 08:55 KST (23:55 UTC 전날) → ma-morning 트리거
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
jobs:
  trade-ma:
    name: MA 이평선 전략 (S2)
    runs-on: ubuntu-latest
    timeout-minutes: 30      # 08:55 시작 → 09:00 대기(5분) → 09:10 주문 완료 + 여유

    permissions:
      contents: write        # 포지션 변경 시 ma_data.json git push 필요

    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.mode == 'ma-morning'

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: MA 이평선 전략 실행
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          LOG_LEVEL:            INFO
        run: python main.py --mode ma-morning

      - name: 로그 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ma-log-${{ github.run_id }}
          path: logs/
          retention-days: 90
          if-no-files-found: ignore

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Job B: 전략1 — 옥동자 오전 수급
# 07:50 시작 → 08:00~08:40 NXT 수집 → 08:45 NXT 매수 → 10:00 타임컷
# cron-job.org: 07:50 KST (22:50 UTC 전날) → morning 트리거
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  trade-morning:
    name: 옥동자 오전 전략 (S1)
    runs-on: ubuntu-latest
    timeout-minutes: 150     # 07:50 시작 → 09:50 타임컷 (120분) + 여유

    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'morning'

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 옥동자 오전 수급 전략 실행
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          LOG_LEVEL:            INFO
        run: python main.py --mode morning

      - name: 로그 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-log-${{ github.run_id }}
          path: logs/
          retention-days: 90
          if-no-files-found: ignore

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Job C: 유틸리티 — 잔고조회 / API테스트 / 시세 등 수동 전용
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  trade-utils:
    name: 유틸리티
    runs-on: ubuntu-latest
    timeout-minutes: 30

    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.mode != 'morning'         &&
      github.event.inputs.mode != 'ma-morning'      &&
      github.event.inputs.mode != 'ma-batch'        &&
      github.event.inputs.mode != 'canslim-morning' &&
      github.event.inputs.mode != 'canslim-batch'   &&
      github.event.inputs.mode != 'sepa-morning'    &&
      github.event.inputs.mode != 'sepa-batch'      &&
      github.event.inputs.mode != 'update-watchlist'

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 잔고 조회
        if: github.event.inputs.mode == 'balance'
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
        run: python main.py --mode balance

      - name: 종목 API 연결 테스트
        if: github.event.inputs.mode == 'check-watchlist'
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
          LOG_LEVEL:            INFO
        run: python main.py --mode check-watchlist

      - name: 투자자 동향 raw 응답 덤프
        if: github.event.inputs.mode == 'debug-investor'
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
          LOG_LEVEL:            DEBUG
        run: python main.py --mode debug-investor --code ${{ github.event.inputs.code || '005930' }}

      - name: 종목 시세 조회
        if: github.event.inputs.mode == 'market'
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
        run: python main.py --mode market --code ${{ github.event.inputs.code || '005930' }}

      - name: 로그 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: utils-log-${{ github.run_id }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Job D: MA 이평선 배치 업데이트
# cron-job.org 외부 트리거 권장 (GitHub Actions schedule은 지연/누락 가능):
#   URL  : https://api.github.com/repos/thebigone9414/stock/actions/workflows/trading.yml/dispatches
#   Body : {"ref":"main","inputs":{"mode":"ma-batch"}}
#   [1차] 16:30 KST (07:30 UTC)  Mon-Fri
#   [2차] 18:05 KST (09:05 UTC)  Mon-Fri  ← 1차 실패 시 재시도 (중복 실행 자동 방지)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  update-ma:
    name: MA 이평선 배치
    runs-on: ubuntu-latest
    timeout-minutes: 120       # 최초 풀로딩 820일 대비 (증분 로딩 후엔 ~10분으로 단축됨)

    permissions:
      contents: write           # git push 권한 필요

    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'ma-batch'

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: MA 이평선 데이터 업데이트
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          LOG_LEVEL:            INFO
        run: python batch/update_ma.py

      - name: 배치 실패 텔레그램 알림
        if: failure() || cancelled()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          NOW=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M')
          if [ "${{ job.status }}" = "cancelled" ]; then
            REASON="타임아웃 또는 강제 취소"
          else
            REASON="오류 발생 (Python 예외)"
          fi
          MSG="[MA배치] 배치 미완료 — ${NOW}"$'\n'"원인: ${REASON}"$'\n'"→ ma-batch 수동 재실행 필요 (workflow_dispatch)"
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}"

      - name: 로그 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ma-batch-log-${{ github.run_id }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Job E: KOSPI200 구성 종목 갱신 (매월 1일 자동 / 수동 update-watchlist)
# KOSPI200 분기 리밸런싱(6·12월) 후 자동 반영
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  update-watchlist:
    name: KOSPI200 종목 갱신
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write           # kospi200_cache.json git push 필요

    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'update-watchlist'

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: KOSPI200 구성 종목 업데이트
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
          LOG_LEVEL:            INFO
        run: python batch/update_watchlist.py

      - name: 로그 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watchlist-log-${{ github.run_id }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Job F: 전략3 — CANSLIM 아침 매매
# 08:55 시작 (canslim-morning 트리거) → 09:00 개장 대기 → 매수/매도
# cron-job.org: 08:55 KST (23:55 UTC 전날) → canslim-morning 트리거
#
# Actions 사용량 가이드 (무료 3,000분/월):
#   S1(~80분)+S2(~25분)+S3(~20분)+배치(~40분) = ~165분/일 × 22 ≈ 3,630분
#   → S1(morning) 비활성화 시: ~85분/일 × 22 ≈ 1,870분 (여유)
#   S1 비활성화: cron-job.org에서 morning 트리거 제거
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  trade-canslim:
    name: CANSLIM 전략 (S3)
    runs-on: ubuntu-latest
    timeout-minutes: 30      # 08:55 시작 → 09:20 완료 + 여유

    permissions:
      contents: write        # canslim_positions.json git push 필요

    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.mode == 'canslim-morning'

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: CANSLIM 전략 실행
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          LOG_LEVEL:            INFO
        run: python main.py --mode canslim-morning

      - name: 로그 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canslim-log-${{ github.run_id }}
          path: logs/
          retention-days: 90
          if-no-files-found: ignore

