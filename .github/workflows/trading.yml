name: 옥동자 자동매매

on:
  schedule:
    # [아침 매매] 월~금 07:30 KST = UTC 22:30 (전날) → 일~목(UTC)
    - cron: '30 22 * * 0-4'
    # [MA 배치] 월~금 16:30 KST = UTC 07:30 → 월~금(UTC)
    - cron: '30 7 * * 1-5'
    # [MA 배치 재시도] 월~금 18:00 KST = UTC 09:00 (16:30 실패 시 자동 재시도, idempotency로 중복 실행 방지)
    - cron: '0 9 * * 1-5'
    # [종목 업데이트] 매월 1일 10:00 KST = UTC 01:00 (KOSPI200 분기 리밸런싱 자동 반영)
    - cron: '0 1 1 * *'

  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: true
        default: 'check-watchlist'
        type: choice
        options:
          - morning          # 전략1+2 동시 실행 (cron-job.org 트리거용)
          - ma-morning       # 전략2 단독 실행
          - ma-batch         # MA 이평선 데이터 배치 업데이트
          - update-watchlist # KOSPI200 구성 종목 갱신 (월 1회 자동 실행)
          - balance          # 잔고 조회
          - check-watchlist  # 종목 수급 API 테스트
          - debug-investor   # 단일 종목 raw JSON 덤프
          - market           # 단일 종목 시세
      code:
        description: '종목코드 (market/debug-investor 모드 전용)'
        required: false
        default: '005930'

concurrency:
  # 배치(ma-batch·update-watchlist)는 okdongja-batch 그룹, 나머지는 okdongja-trading
  # → 아침 매매 run이 살아있어도 배치 run이 대기열에 갇히지 않음
  # → schedule cron + cron-job.org workflow_dispatch 둘 다 같은 그룹에 묶여 idempotency로 중복 실행 방지
  group: ${{ ((github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'ma-batch' || github.event.inputs.mode == 'update-watchlist')) || (github.event_name == 'schedule' && (github.event.schedule == '30 7 * * 1-5' || github.event.schedule == '0 9 * * 1-5' || github.event.schedule == '0 1 1 * *'))) && 'okdongja-batch' || 'okdongja-trading' }}
  cancel-in-progress: false   # 실행 중인 매매 절대 중단 금지

# Job D·E의 job-level concurrency(okdongja-batch)는 workflow-level과 동일하므로 사실상 중복이지만 안전장치로 유지

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Job A: 전략2 — MA 이평선 중장기 (전략1과 병렬 실행)
# 07:50 시작 → 09:00까지 내부 대기 → 시장가 매수/매도
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
jobs:
  trade-ma:
    name: MA 이평선 전략 (S2)
    runs-on: ubuntu-latest
    timeout-minutes: 130     # 07:30 시작 → 09:00 대기 → 09:10 주문 완료 + 여유

    permissions:
      contents: write        # 포지션 변경 시 ma_data.json git push 필요

    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 22 * * 0-4') ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.mode == 'morning' ||
        github.event.inputs.mode == 'ma-morning'
      ))

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          ref: claude/stock-trading-system-z6xQh
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: MA 이평선 전략 실행
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          LOG_LEVEL:            INFO
        run: python main.py --mode ma-morning

      - name: 로그 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ma-log-${{ github.run_id }}
          path: logs/
          retention-days: 90
          if-no-files-found: ignore

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Job B: 전략1 — 옥동자 오전 수급 (전략2와 병렬 실행)
# 07:30 시작 → 08:00 NXT 수집 시작 → 09:10 매수 → 10:00 타임컷
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  trade-morning:
    name: 옥동자 오전 전략 (S1)
    runs-on: ubuntu-latest
    timeout-minutes: 180     # 07:30 시작 → 10:00 타임컷 (150분) + 여유

    if: |
      (github.event_name == 'schedule' && github.event.schedule == '30 22 * * 0-4') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'morning')

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          ref: claude/stock-trading-system-z6xQh

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 옥동자 오전 수급 전략 실행
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          LOG_LEVEL:            INFO
        run: python main.py --mode morning

      - name: 로그 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: morning-log-${{ github.run_id }}
          path: logs/
          retention-days: 90
          if-no-files-found: ignore

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Job C: 유틸리티 — 잔고조회 / API테스트 / 시세 등 수동 전용
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  trade-utils:
    name: 유틸리티
    runs-on: ubuntu-latest
    timeout-minutes: 30

    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.mode != 'morning' &&
      github.event.inputs.mode != 'ma-morning' &&
      github.event.inputs.mode != 'ma-batch' &&
      github.event.inputs.mode != 'update-watchlist'

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          ref: claude/stock-trading-system-z6xQh

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: 잔고 조회
        if: github.event.inputs.mode == 'balance'
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
        run: python main.py --mode balance

      - name: 종목 API 연결 테스트
        if: github.event.inputs.mode == 'check-watchlist'
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
          LOG_LEVEL:            INFO
        run: python main.py --mode check-watchlist

      - name: 투자자 동향 raw 응답 덤프
        if: github.event.inputs.mode == 'debug-investor'
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
          LOG_LEVEL:            DEBUG
        run: python main.py --mode debug-investor --code ${{ github.event.inputs.code || '005930' }}

      - name: 종목 시세 조회
        if: github.event.inputs.mode == 'market'
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
        run: python main.py --mode market --code ${{ github.event.inputs.code || '005930' }}

      - name: 로그 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: utils-log-${{ github.run_id }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Job D: MA 이평선 배치 업데이트
# cron-job.org 외부 트리거 권장 (GitHub Actions schedule은 지연/누락 가능):
#   URL  : https://api.github.com/repos/thebigone9414/stock/actions/workflows/trading.yml/dispatches
#   Body : {"ref":"claude/stock-trading-system-z6xQh","inputs":{"mode":"ma-batch"}}
#   [1차] 16:35 KST (07:35 UTC)  Mon-Fri
#   [2차] 18:05 KST (09:05 UTC)  Mon-Fri  ← 1차 실패 시 재시도 (중복 실행 자동 방지)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  update-ma:
    name: MA 이평선 배치
    runs-on: ubuntu-latest
    timeout-minutes: 120       # 최초 풀로딩 820일 대비 (증분 로딩 후엔 ~10분으로 단축됨)

    permissions:
      contents: write           # git push 권한 필요

    if: |
      (github.event_name == 'schedule' && (
        github.event.schedule == '30 7 * * 1-5' ||
        github.event.schedule == '0 9 * * 1-5'
      )) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'ma-batch')

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          ref: claude/stock-trading-system-z6xQh
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: MA 이평선 데이터 업데이트
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          LOG_LEVEL:            INFO
        run: python batch/update_ma.py

      - name: 로그 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ma-batch-log-${{ github.run_id }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Job E: KOSPI200 구성 종목 갱신 (매월 1일 자동 / 수동 update-watchlist)
# KOSPI200 분기 리밸런싱(6·12월) 후 자동 반영
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  update-watchlist:
    name: KOSPI200 종목 갱신
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write           # kospi200_cache.json git push 필요

    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 1 1 * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'update-watchlist')

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          ref: claude/stock-trading-system-z6xQh
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: KOSPI200 구성 종목 업데이트
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
          LOG_LEVEL:            INFO
        run: python batch/update_watchlist.py

      - name: 로그 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watchlist-log-${{ github.run_id }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore
