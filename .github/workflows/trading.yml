name: 옥동자 자동매매

on:
  schedule:
    # 매일(월~금) 한국시간 08:50 실행
    # KST 08:50 = UTC 23:50 (전날) → 일~목(UTC) = 월~금(KST)
    - cron: '50 23 * * 0-4'

  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: true
        default: 'check-watchlist'
        type: choice
        options:
          - morning          # 옥동자 오전 수급 전략 (실제 매매)
          - balance          # 잔고 조회
          - check-watchlist  # 84종목 수급 API 테스트
          - debug-investor   # 단일 종목 raw JSON 덤프 (필드명 확인)
          - market           # 단일 종목 시세
      code:
        description: '종목코드 (market 모드 전용)'
        required: false
        default: '005930'

concurrency:
  group: okdongja-trading
  cancel-in-progress: false   # 실행 중인 매매 절대 중단 금지

jobs:
  trade:
    name: 옥동자 매매
    runs-on: ubuntu-latest
    timeout-minutes: 90       # 08:50 시작 → 09:55 종료 여유 포함

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4
        with:
          ref: claude/stock-trading-system-z6xQh

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      # ── 자동 스케줄 실행 (매일 08:50 KST) ─────────────────────
      - name: 옥동자 오전 수급 전략 (자동)
        if: github.event_name == 'schedule'
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          LOG_LEVEL:            INFO
        run: python main.py --mode morning

      # ── 수동 실행: 옥동자 오전 전략 ────────────────────────────
      - name: 옥동자 오전 전략 (수동)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'morning'
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          LOG_LEVEL:            INFO
        run: python main.py --mode morning

      # ── 수동 실행: 잔고 조회 ────────────────────────────────────
      - name: 잔고 조회
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'balance'
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
        run: python main.py --mode balance

      # ── 수동 실행: 80종목 API 테스트 ────────────────────────────
      - name: 80종목 API 연결 테스트
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'check-watchlist'
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
          LOG_LEVEL:            INFO
        run: python main.py --mode check-watchlist

      # ── 수동 실행: 투자자 동향 raw 덤프 (필드명 확인) ─────────────
      - name: 투자자 동향 raw 응답 덤프
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'debug-investor'
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
          LOG_LEVEL:            DEBUG
        run: python main.py --mode debug-investor --code ${{ github.event.inputs.code || '005930' }}

      # ── 수동 실행: 단일 종목 시세 ───────────────────────────────
      - name: 종목 시세 조회
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'market'
        env:
          KIS_APP_KEY:          ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:       ${{ secrets.KIS_APP_SECRET }}
          KIS_ACCOUNT_NO:       ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_IS_PAPER_TRADING: ${{ secrets.KIS_IS_PAPER_TRADING }}
        run: python main.py --mode market --code ${{ github.event.inputs.code || '005930' }}

      # ── 로그 아티팩트 저장 ───────────────────────────────────────
      - name: 로그 저장
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: okdongja-log-${{ github.run_id }}
          path: logs/
          retention-days: 90
          if-no-files-found: ignore
